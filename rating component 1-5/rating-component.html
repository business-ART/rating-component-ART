<!DOCTYPE html>

<html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
      <link rel="stylesheet" type="text/css" href="rating-component.css">
    
      <title>Rating Component (1-5)</title>
  </head>
  <body>

    <div class="rating-box">
      <div class="star-background">
        <img src="">
      </div>

      <div class="txt-rating-btn">
        <p class="rating-question">How did we do?</p>
        <p class="rating-feedback-txt">Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>
        
        <div class="bckgrnd-1">
          <p class="nmbr-">1</p>
        </div>

        <div class="bckgrnd-2">
          <p class="nmbr-2">2</p>
        </div>

        <div>
          <p>3</p>
        </div>

        <button class="submit-btn">Submit</button>
      </div>
    </div>



    <script src="rating-component.js"></script>
  </body>
</html>
